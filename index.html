var trackerState = useState(createTracker);
var tracker = trackerState[0];
var setTracker = trackerState[1];

var scenario = scenarioKey ? SCENARIOS[scenarioKey] : null;
var currentScreen = SCREEN_FLOW[screenIdx];

var progress = screenIdx / (SCREEN_FLOW.length - 1);

useEffect(function() {
if (currentScreen && tracker.screensVisited.indexOf(currentScreen) === -1) {
setTracker(function(prev) {
var visited = prev.screensVisited.slice();
visited.push(currentScreen);
return Object.assign({}, prev, { screensVisited: visited });
});
}
}, [currentScreen]);

function goNext() { setScreenIdx(function(i) { return Math.min(i + 1, SCREEN_FLOW.length - 1); }); }
function goBack() { setScreenIdx(function(i) { return Math.max(i - 1, 0); }); }
function goToScreen(name) {
var idx = SCREEN_FLOW.indexOf(name);
if (idx >= 0) setScreenIdx(idx);
}

function handleSelectScenario(key) {
setScenarioKey(key);
setTracker(function(prev) { return Object.assign({}, prev, { scenarioType: key, startTime: new Date().toISOString() }); });
goNext();
}

function handleRestart() {
setScreenIdx(0);
setScenarioKey(null);
setTraineeName({ first: “”, last: “” });
setTracker(createTracker());
}

function handleComplete() {
setTracker(function(prev) { return Object.assign({}, prev, { completed: true, endTime: new Date().toISOString() }); });
goNext();
}

function openViewApp() { setShowEA900(true); }

function renderScreen() {
switch (currentScreen) {
case “welcome”: return React.createElement(WelcomeScreen, { traineeName: traineeName, setTraineeName: setTraineeName, onNext: goNext });
case “disclaimer”: return React.createElement(DisclaimerScreen, { onNext: goNext });
case “login”: return React.createElement(LoginScreen, { onNext: goNext });
case “carsDashboard”: return React.createElement(CARSDashboard, { onSelectScenario: handleSelectScenario });
case “carsApplicantInfo”: return React.createElement(CARSApplicantInfo, { scenario: scenario, onNext: goNext, onBack: goBack, onViewApp: openViewApp });
case “carsIncome”: return React.createElement(CARSDataScreen, {
title: “Income”, onNext: goNext, onBack: goBack, onViewApp: openViewApp,
fields: Object.entries(scenario.applicant.income).map(function(p) {
return [p[0].replace(/([A-Z])/g, “ $1”).replace(/^./, function(s){return s.toUpperCase();}), p[1]];
})
});
case “carsResources”: return React.createElement(CARSDataScreen, {
title: “Resources/Expenses”, onNext: goNext, onBack: goBack, onViewApp: openViewApp,
fields: Object.entries(scenario.applicant.resources).concat(Object.entries(scenario.applicant.expenses)).map(function(p) {
return [p[0].replace(/([A-Z])/g, “ $1”).replace(/^./, function(s){return s.toUpperCase();}), p[1]];
})
});
case “carsAdditionalQuestions”: return React.createElement(CARSDataScreen, {
title: “Additional Questions”, onNext: goNext, onBack: goBack, onViewApp: openViewApp,
fields: [[“Receiving SNAP benefits in another state?”, “No”], [“Any household member a fleeing felon?”, “No”], [“Any household member in violation of parole?”, “No”], [“Any household member a convicted drug felon?”, “No”], [“Is anyone a migrant/seasonal farm worker?”, “No”]]
});
case “carsHousehold”: return React.createElement(CARSHouseholdScreen, { scenario: scenario, onNext: goNext, onBack: goBack, onViewApp: openViewApp });
case “carsAdditionalAppInfo”: return React.createElement(CARSDataScreen, {
title: “Additional Application Info (Optional)”, onNext: goNext, onBack: goBack, onViewApp: openViewApp,
fields: [[“SNAP Authorized Representative”, “None”], [“SNAP Benefit Representative”, “None”], [“Additional Household Members”, “None”]]
});
case “mavsFUSC”: return React.createElement(FUSC, { onNext: goNext, onBack: goBack });
case “mavsCLIR”: return React.createElement(CLIR, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsCLIS”: return React.createElement(CLIS, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsCLRE”: return React.createElement(CLRE, { onNext: goNext, onBack: goBack });
case “mavsCLPR”: return React.createElement(CLPR, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsCLIR_DRS”: return React.createElement(CLIR_DRS, { onNext: goNext, onBack: goBack });
case “mavsDRPR”: return React.createElement(DRPR, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsREAP”: return React.createElement(REAP, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsEXSW”: return React.createElement(EXSW, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsADDR”: return React.createElement(ADDR, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsCAP1”: return React.createElement(CAP1, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsNORE”: return React.createElement(NORE, { scenario: scenario, onNext: goNext, onBack: goBack });
case “mavsNOTI”: return React.createElement(NOTI, { scenario: scenario, onNext: goNext, onBack: goBack });
case “carsCase”: return React.createElement(CARSCaseScreen, { scenario: scenario, onNext: goNext, onBack: goBack });
case “carsAppointment”: return React.createElement(CARSAppointment, { scenario: scenario, onNext: handleComplete, onBack: goBack });
case “complete”: return React.createElement(CompleteScreen, { traineeName: traineeName, scenario: scenario, onRestart: handleRestart });
default: return React.createElement(“div”, null, “Unknown screen”);
}
}

var showHeader = NON_NAV_SCREENS.indexOf(currentScreen) === -1;

return React.createElement(“div”, { style: S.app },
showHeader && React.createElement(“div”, { style: S.header },
React.createElement(“div”, null,
React.createElement(“div”, { style: S.headerTitle }, “MDHS County Training Simulator”),
React.createElement(“div”, { style: S.headerSub }, traineeName.first + “ “ + traineeName.last + (scenarioKey ? “ | “ + SCENARIOS[scenarioKey].label + “ Application” : “”))
),
React.createElement(“div”, { style: { display: “flex”, alignItems: “center”, gap: “12px” } },
React.createElement(“span”, { style: { fontSize: “11px”, color: “#556” } }, “Screen “ + (screenIdx + 1) + “/” + SCREEN_FLOW.length),
React.createElement(“div”, { style: { width: “100px” } }, React.createElement(ProgressBar, { current: screenIdx, total: SCREEN_FLOW.length - 1 }))
)
),
React.createElement(“div”, { style: S.body }, renderScreen()),
showHeader && React.createElement(“div”, { style: S.footer },
React.createElement(“span”, null, “\u00A9 2026 MDHS Economic Programs Training Division”),
React.createElement(“span”, null, “Training Simulation Only - Not Connected to Live Systems”)
),
showEA900 && scenario && React.createElement(EA900Modal, { applicant: scenario.applicant, onClose: function() { setShowEA900(false); } })
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(React.createElement(App));
</script>
