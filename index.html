// – BUSINESS DAYS HELPER –
function addBusinessDays(days) {
var d = new Date();
var count = 0;
while (count < days) {
d.setDate(d.getDate() + 1);
var dow = d.getDay();
if (dow !== 0 && dow !== 6) { count++; }
}
var mo = String(d.getMonth() + 1);
if (mo.length < 2) { mo = ‘0’ + mo; }
var dy = String(d.getDate());
if (dy.length < 2) { dy = ‘0’ + dy; }
return mo + ‘/’ + dy + ‘/’ + d.getFullYear();
}

function getTodayStr() {
var d = new Date();
var mo = String(d.getMonth() + 1);
if (mo.length < 2) { mo = ‘0’ + mo; }
var dy = String(d.getDate());
if (dy.length < 2) { dy = ‘0’ + dy; }
return mo + ‘/’ + dy + ‘/’ + d.getFullYear();
}

// P1: MAVERICS date format MMDDYY
function getMavDate() {
var d = new Date();
var mo = String(d.getMonth() + 1);
if (mo.length < 2) { mo = ‘0’ + mo; }
var dy = String(d.getDate());
if (dy.length < 2) { dy = ‘0’ + dy; }
var yr = String(d.getFullYear()).substring(2);
return mo + dy + yr;
}

function toMavDate(dateStr) {
// Convert MM/DD/YYYY to MMDDYY
var parts = dateStr.split(’/’);
if (parts.length === 3) {
var yr = parts[2].length === 4
? parts[2].substring(2) : parts[2];
return parts[0] + parts[1] + yr;
}
return dateStr;
}

// P4: DOB format validator
function isValidDobFormat(val) {
if (val.length !== 10) { return false; }
if (val.charAt(2) !== ‘/’ || val.charAt(5) !== ‘/’) {
return false;
}
var mo = val.substring(0, 2);
var dy = val.substring(3, 5);
var yr = val.substring(6, 10);
var moN = parseInt(mo, 10);
var dyN = parseInt(dy, 10);
var yrN = parseInt(yr, 10);
if (isNaN(moN) || isNaN(dyN) || isNaN(yrN)) {
return false;
}
if (moN < 1 || moN > 12) { return false; }
if (dyN < 1 || dyN > 31) { return false; }
if (yrN < 1900 || yrN > 2100) { return false; }
return true;
}

if (screen === 14) {
return h(MavCLPR, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 15) {
return h(MavCLIRDRS, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 16) {
return h(MavDRPR, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 17) {
return h(MavREAP, {
scenario: scenario,
reapProg: reapProg,
setReapProg: setReapProg,
reapInt: reapInt,
setReapInt: setReapInt,
reapError: reapError,
setReapError: setReapError,
onNext: goNext,
onBack: goBack
});
}
if (screen === 18) {
return h(MavEXSW, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 19) {
return h(MavADDR, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 20) {
return h(MavCAP1, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 21) {
return h(MavNORE, {
scenario: scenario,
onNext: goNext,
onBack: goBack
});
}
if (screen === 22) {
return h(MavNOTI, {
scenario: scenario,
onNext: goNext
});
}
if (screen === 23) {
return h(CarsCaseNumber, {
scenario: scenario,
caseInput: caseInput,
setCaseInput: setCaseInput,
caseErr: caseErr,
setCaseErr: setCaseErr,
idsRetrieved: idsRetrieved,
setIdsRetrieved: setIdsRetrieved,
onNext: goNext,
onBack: goBack
});
}
if (screen === 24) {
return h(CarsAppointment, {
scenario: scenario,
apptSubmitted: apptSubmitted,
setApptSubmitted: setApptSubmitted,
onNext: goNext,
onBack: goBack
});
}
if (screen === 25) {
return h(CompletionScreen, {
scenario: scenario,
traineeName: traineeName,
onRestart: handleRestart
});
}
return h(‘div’, null, ‘Unknown screen’);
}

var headerEl = showHeader
? h(‘div’, null,
h(‘div’, { className: ‘sim-header’ },
h(‘div’, { className: ‘sim-header-title’ },
isMaverics
? ‘MDHS MAVERICS TERMINAL’
: ‘MDHS COUNTY TRAINING SIMULATOR’
),
h(‘div’, { className: ‘sim-header-right’ },
h(‘div’, null,
’Screen ’ + screen + ’ of ’ +
(TOTAL_SCREENS - 1)
),
h(‘div’, null,
SCREEN_LABELS[screen] || ‘’
)
)
),
h(‘div’, { className: ‘progress-bar-wrap’ },
h(‘div’, {
className: ‘progress-bar-fill’,
style: { width: progress + ‘%’ }
})
)
)
: null;

var wrapClass = screen === 0 ? ‘’ : ‘sim-wrapper’;
var bodyStyle = screen === 0
? { minHeight: ‘100vh’ }
: {};

return h(‘div’, {
className: wrapClass, style: bodyStyle
},
headerEl,
screen === 0
? h(‘div’, { style: { minHeight: ‘100vh’ } },
h(‘div’, {
className: ‘screen-card’,
style: {
maxWidth: ‘500px’, margin: ‘0 auto’,
borderRadius: ‘0’
}
}, renderScreen())
)
: h(‘div’, { className: ‘sim-body’ },
h(‘div’, { className: ‘screen-card’ },
renderScreen()
)
),
h(FullApplicationModal, {
open: showModal,
scenario: scenario,
onClose: function(){ setShowModal(false); }
})
);
}

ReactDOM.createRoot(
document.getElementById(‘root’)
).render(h(App));
</script>

</body>
</html>
