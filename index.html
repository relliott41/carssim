function App(){
var idxS=useState(0);var idx=idxS[0];var setIdx=idxS[1];
var tnS=useState({first:””,last:””});var tn=tnS[0];var setTn=tnS[1];
var skS=useState(null);var sk=skS[0];var setSk=skS[1];
var eaS=useState(false);var showEA=eaS[0];var setShowEA=eaS[1];

var sc=sk?SCENARIOS[sk]:null;
var screen=SCREENS[idx];
var pct=Math.round((idx/(SCREENS.length-1))*100);
var showChrome=[“welcome”,“disclaimer”,“login”,“complete”].indexOf(screen)===-1;

function goNext(){setIdx(function(i){return Math.min(i+1,SCREENS.length-1);});}
function goBack(){setIdx(function(i){return Math.max(i-1,0);});}
function selectSc(key){setSk(key);goNext();}
function handleComplete(){goNext();}
function restart(){setIdx(0);setSk(null);setTn({first:””,last:””});}
function openApp(){setShowEA(true);}

function renderScreen(){
switch(screen){
case “welcome”:return h(WelcomeScreen,{tn:tn,setTn:setTn,onNext:goNext});
case “disclaimer”:return h(DisclaimerScreen,{onNext:goNext});
case “login”:return h(LoginScreen,{onNext:goNext});
case “dashboard”:return h(Dashboard,{onSelect:selectSc});
case “carsApplicant”:return h(CarsApplicantInfo,{sc:sc,onNext:goNext,onBack:goBack,onViewApp:openApp});
case “carsIncome”:return h(CarsDataScreen,{title:“Income”,fields:Object.entries(sc.applicant.income),onNext:goNext,onBack:goBack,onViewApp:openApp});
case “carsResources”:var rf=Object.entries(sc.applicant.resources).concat(Object.entries(sc.applicant.expenses));return h(CarsDataScreen,{title:“Resources/Expenses”,fields:rf,onNext:goNext,onBack:goBack,onViewApp:openApp});
case “carsQuestions”:return h(CarsDataScreen,{title:“Additional Questions”,fields:[[“Receiving SNAP in another state?”,“No”],[“Fleeing felon?”,“No”],[“Parole violation?”,“No”],[“Convicted drug felon?”,“No”],[“Migrant farm worker?”,“No”]],onNext:goNext,onBack:goBack,onViewApp:openApp});
case “carsHousehold”:return h(CarsHousehold,{sc:sc,onNext:goNext,onBack:goBack,onViewApp:openApp});
case “carsAddlInfo”:return h(CarsDataScreen,{title:“Additional Application Info”,fields:[[“SNAP Authorized Rep”,“None”],[“SNAP Benefit Rep”,“None”],[“Additional Members”,“None”]],onNext:goNext,onBack:goBack,onViewApp:openApp});
case “mavsFUSC”:return h(FUSC,{onNext:goNext,onBack:goBack});
case “mavsCLIR”:return h(CLIR,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsCLIS”:return h(CLIS,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsCLRE”:return h(CLRE,{onNext:goNext,onBack:goBack});
case “mavsCLPR”:return h(CLPR,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsCLIR_DRS”:return h(CLIR_DRS,{onNext:goNext,onBack:goBack});
case “mavsDRPR”:return h(DRPR,{onNext:goNext,onBack:goBack});
case “mavsREAP”:return h(REAP,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsEXSW”:return h(EXSW,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsADDR”:return h(ADDR,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsCAP1”:return h(CAP1,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsNORE”:return h(NORE,{sc:sc,onNext:goNext,onBack:goBack});
case “mavsNOTI”:return h(NOTI,{sc:sc,onNext:goNext,onBack:goBack});
case “carsCase”:return h(CarsCase,{sc:sc,onNext:goNext,onBack:goBack});
case “carsAppt”:return h(CarsAppt,{sc:sc,onNext:handleComplete,onBack:goBack});
case “complete”:return h(CompleteScreen,{tn:tn,sc:sc,onRestart:restart});
default:return h(“div”,null,“Unknown screen”);
}
}

return h(“div”,{className:“sim-app”},
showChrome?h(“div”,{className:“sim-header”},
h(“div”,null,
h(“div”,{style:{color:”#fff”,fontSize:“13px”,fontWeight:700}},“MDHS County Training Simulator”),
h(“div”,{style:{color:”#0f766e”,fontSize:“10px”}},tn.first+” “+tn.last+(sk?” | “+SCENARIOS[sk].label+” Application”:””))
),
h(“div”,{style:{display:“flex”,alignItems:“center”,gap:“10px”}},
h(“span”,{style:{fontSize:“10px”,color:”#475569”}},“Screen “+(idx+1)+”/”+SCREENS.length),
h(“div”,{className:“pbar”},h(“div”,{className:“pfill”,style:{width:pct+”%”}}))
)
):null,
h(“div”,{className:“sim-body”},renderScreen()),
showChrome?h(“div”,{className:“sim-footer”},h(“span”,null,”\u00A9 2026 MDHS Economic Programs Training Division”),h(“span”,null,“Training Simulation Only”)):null,
showEA&&sc?h(EA900,{a:sc.applicant,onClose:function(){setShowEA(false);}}):null
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
</script>

</body>
</html>
