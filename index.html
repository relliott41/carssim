<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDHS Test</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
function App() {
  return h("div", {style: {background: "#0B1D3A", color: "#fff", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "sans-serif"}},
    h("div", {style: {textAlign: "center"}},
      h("h1", null, "MDHS County Training Simulator"),
      h("p", {style: {color: "#0f766e"}}, "React is working on GitHub Pages!"),
      h("p", {style: {color: "#666", fontSize: "14px"}}, "If you see this, the full simulator will work too.")
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
